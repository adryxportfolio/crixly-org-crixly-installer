name: build-runtime

on:
  push:
    branches: [ main ]
    paths:
      - .github/workflows/build-runtime.yml
      - bundled-skills/**
      - RUNTIME_SOURCE.md
  workflow_dispatch:
    inputs:
      ref:
        description: "Runtime git ref (commit SHA or tag)"
        required: true
        default: "main"

jobs:
  build_runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout installer repo
        uses: actions/checkout@v4

      - name: Checkout pinned runtime
        uses: actions/checkout@v4
        with:
          repository: frameflowmedia4partners-rgb/CrixlyFinalAgentic
          token: ${{ secrets.RUNTIME_REPO_TOKEN }}
          ref: ${{ inputs.ref || 'main' }}
          path: runtime
          fetch-depth: 1

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: runtime/pnpm-lock.yaml

      - name: Install + build runtime
        working-directory: runtime
        run: |
          pnpm install
          pnpm -r build

      - name: Package runtime dist + bundled skills
        run: |
          mkdir -p releases
          tar -czf releases/crixly-runtime-dist.tgz -C runtime dist crixly.mjs package.json
          # Bundle skills from this repo (bundled-skills/) into the same archive.
          tar -czf releases/crixly-bundled-skills.tgz -C bundled-skills .

      - name: Copy into Pages releases directory
        run: |
          mkdir -p install/releases
          cp releases/crixly-runtime-dist.tgz install/releases/crixly-runtime-dist.tgz
          cp releases/crixly-bundled-skills.tgz install/releases/crixly-bundled-skills.tgz

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crixly-runtime-bundle
          path: |
            releases/crixly-runtime-dist.tgz
            releases/crixly-bundled-skills.tgz
            install/releases/crixly-runtime-dist.tgz
            install/releases/crixly-bundled-skills.tgz
