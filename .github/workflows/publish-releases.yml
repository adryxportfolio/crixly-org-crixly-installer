name: publish-releases

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["build", "build-runtime"]
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest CLI artifact from build workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          workflow_conclusion: completed
          name: crixlyctl-cli-tgz
          path: artifacts/cli
          branch: main
          if_no_artifact_found: fail

      - name: Download latest runtime artifact from build-runtime workflow
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build-runtime.yml
          workflow_conclusion: completed
          name: crixly-runtime-bundle
          path: artifacts/runtime
          branch: main
          if_no_artifact_found: fail

      - name: Stage releases into install/releases
        run: |
          mkdir -p install/releases
          cp -f artifacts/cli/**/releases/*.tgz install/releases/ || true
          cp -f artifacts/cli/**/install/releases/*.tgz install/releases/ || true
          cp -f artifacts/runtime/**/install/releases/*.tgz install/releases/ || true
          cp -f artifacts/runtime/**/releases/*.tgz install/releases/ || true
          ls -la install/releases || true

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deploy tooling
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm wrangler pages deploy install --project-name=crixly-install --branch=main
